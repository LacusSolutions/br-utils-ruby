# Single source of truth: gem name (hyphenated) => dir + internal dependencies.
# Order: leaves first. Rake and CI use this for build order and cycle detection.

gems:
  cpf-dv:
    dir: cpf-dv
  cpf-fmt:
    dir: cpf-fmt
  cpf-gen:
    dir: cpf-gen
  cpf-val:
    dir: cpf-val
  cnpj-dv:
    dir: cnpj-dv
  cnpj-fmt:
    dir: cnpj-fmt
  cnpj-gen:
    dir: cnpj-gen
  cnpj-val:
    dir: cnpj-val
  cpf-utilities:
    dir: cpf-utilities
    dependencies: [cpf-fmt, cpf-gen, cpf-val]
  cnpj-utilities:
    dir: cnpj-utilities
    dependencies: [cnpj-fmt, cnpj-gen, cnpj-val]
  br-utilities:
    dir: br-utilities
    dependencies: [cpf-utilities, cnpj-utilities]
