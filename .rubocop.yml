plugins:
  - rubocop-rspec
  - rubocop-packaging

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  SuggestExtensions: false
  Exclude:
    - vendor/**/*
    - pkg/**/*
    - '**/Gemfile.lock'
    - '**/.rspec_status'

Layout/LineLength:
  Max: 120

Style/FrozenStringLiteralComment:
  EnforcedStyle: always

Style/Documentation:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - Rakefile
    - '**/Rakefile'
    - '**/*.rake'
    - '**/tests/**/*'

# Gem package dirs use hyphenated names (e.g. cpf-dv.rb) by design
Naming/FileName:
  Exclude:
    - 'packages/**/*'

RSpec:
  Include:
    - 'tests/**/*.spec.rb'
