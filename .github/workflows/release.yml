# Release: publish a single gem to RubyGems via tag. Uses Trusted Publishing (OIDC).
# Tag format: <gem_name>@<version>  e.g. cpf-dv@1.0.1 or br-utilities@2.1.0
# Only the tagged gem is built and pushed; dependencies must already be on RubyGems.
name: Release

on:
  workflow_dispatch:
    inputs:
      gem_name:
        description: "Gem name (RubyGems, e.g. cpf-dv)"
        required: true
        type: string
      version:
        description: "Version (semver, e.g. 1.0.1)"
        required: true
        type: string
  push:
    tags:
      - "*@*"   # e.g. cpf-dv@1.0.1

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      gem_name: ${{ steps.vars.outputs.gem_name }}
      version: ${{ steps.vars.outputs.version }}
      tag: ${{ steps.vars.outputs.tag }}
      dir: ${{ steps.vars.outputs.dir }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            GEM_NAME="${{ github.event.inputs.gem_name }}"
            VERSION="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            GEM_NAME="${TAG%%@*}"
            VERSION="${TAG#*@}"
          fi
          DIR="${GEM_NAME}"
          [ -n "$DIR" ] && [ -n "$VERSION" ] || { echo "::error::Could not get gem name and version (event=${{ github.event_name }}, ref=${{ github.ref }})"; exit 1; }
          [ -d "packages/$DIR" ] || { echo "::error::Package packages/$DIR not found"; exit 1; }
          [ -f "packages/$DIR/${GEM_NAME}.gemspec" ] || { echo "::error::Gemspec not found"; exit 1; }
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]] || { echo "::error::Version must be semver"; exit 1; }
          echo "gem_name=$GEM_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GEM_NAME}@${VERSION}" >> $GITHUB_OUTPUT
          echo "dir=$DIR" >> $GITHUB_OUTPUT

  test-and-release:
    name: Test & Publish
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@09a7688d3b55cf0e976497ff046b70949eeaccfd # v1.288.0
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Ensure version in source matches tag
        run: |
          DIR="${{ needs.validate.outputs.dir }}"
          GEM_NAME="${{ needs.validate.outputs.gem_name }}"
          VERSION="${{ needs.validate.outputs.version }}"
          VER_FILE="packages/$DIR/src/${GEM_NAME}/version.rb"
          grep -qE "VERSION = ['\"]${VERSION}['\"]" "$VER_FILE" || {
            echo "::error::Version in $VER_FILE does not match tag $VERSION. Bump and commit before tagging."
            exit 1
          }

      - name: Run tests
        run: |
          cd "packages/${{ needs.validate.outputs.dir }}"
          # Use deployment mode only when Gemfile.lock is committed (Bundler then requires it)
          [ -f Gemfile.lock ] && export BUNDLE_DEPLOYMENT=true
          bundle install
          bundle exec rake test

      - name: Publish to RubyGems (OIDC)
        working-directory: "packages/${{ needs.validate.outputs.dir }}"
        uses: rubygems/release-gem@1c162a739e8b4cb21a676e97b087e8268d8fc40b # v1.1.2

      # Tag must already exist (pushed by maintainer). No auto-tag here.
