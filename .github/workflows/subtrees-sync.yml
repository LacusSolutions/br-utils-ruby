name: Sync Packages to Individual Branches

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read

jobs:
  detect-packages:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list-packages.outputs.matrix }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - id: list-packages
        run: |
          PACKAGES_DIR="packages"
          echo "🔍 Discovering packages in $PACKAGES_DIR directory..."
          PACKAGES_NAMES=$(find "$PACKAGES_DIR" -mindepth 1 -maxdepth 1 -type d -not -empty | sed 's|^.*/||' | sort)

          PACKAGES=()
          for package_name in $PACKAGES_NAMES; do
            # Skip if package_name is empty or contains invalid characters
            if [[ -z "$package_name" || "$package_name" =~ [^a-zA-Z0-9_-] ]]; then
              echo "⚠️  Skipping invalid package name: '$package_name'"
              continue
            fi

            # Subtree on another branch
            package_prefix="$PACKAGES_DIR/$package_name"
            repo_url="git@github.com:LacusSolutions/br-utils-py.git"
            branch="$package_name/main"
            PACKAGES+=("{\"name\":\"$package_name\",\"prefix\":\"$package_prefix\",\"repo\":\"$repo_url\",\"branch\":\"$branch\"}")
          done

          # Convert array to JSON and save metadata to matrix output
          if [ ${#PACKAGES[@]} -eq 0 ]; then
            echo "❌ No valid packages found"
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
            exit 1
          fi

          printf -v packages_json '%s,' "${PACKAGES[@]}"
          packages_json="[${packages_json%,}]"
          echo "matrix={\"include\":$packages_json}" >> $GITHUB_OUTPUT
          echo "📦 ${#PACKAGES[@]} packages found"

  sync-package:
    needs: detect-packages
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-packages.outputs.matrix) }}
      fail-fast: false # Continue syncing other packages even if one fails
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: webfactory/ssh-agent@a6f90b1f127823b31d4d4a8d96047790581349bd # v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - id: push-subtree
        run: |
          echo "🔄 Syncing '${{ matrix.name }}'..."
          echo "📦 Package:    ${{ matrix.name }}"
          echo "📁 Path:       ${{ matrix.prefix }}"
          echo "🔗 Repository: ${{ matrix.repo }}"
          echo "🌿 Branch:     ${{ matrix.branch }}"

          push_output=$(git subtree push --prefix="${{ matrix.prefix }}" "${{ matrix.repo }}" "${{ matrix.branch }}" 2>&1)
          push_exit_code=$?

          if [ $push_exit_code -eq 0 ]; then
            if echo "$push_output" | grep -q "Everything up-to-date"; then
              echo "ℹ️ '${{ matrix.name }}' already up-to-date"
              status="ℹ️ up-to-date"
            else
              echo "✅ '${{ matrix.name }}' successfully synced"
              status="✅ synced"
            fi
          else
            echo "❌ '${{ matrix.name }}' failed to sync"
            status="❌ failed"
            exit 1
          fi
