name: CI

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  discover:
    name: Discover Packages
    runs-on: ubuntu-latest
    outputs:
      has-test: ${{ steps.discover.outputs.has-test }}
      test-packages: ${{ steps.discover.outputs.test-packages }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: discover
        run: |
          set -euo pipefail

          TEST_PACKAGES=()

          for dir in packages/*/; do
            [ -d "$dir" ] || continue
            pkg=$(basename "${dir%/}")
            gemspec="${dir%/}/${pkg}.gemspec"
            tests="${dir%/}/tests"

            if [ -f "$gemspec" ] && [ -d "$tests" ]; then
              TEST_PACKAGES+=("$pkg")
            fi
          done

          test_json=$(jq -n -c --args '$ARGS.positional | sort' -- "${TEST_PACKAGES[@]}")

          if [ "${#TEST_PACKAGES[@]}" -gt 0 ]; then
            echo "has-test=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-test=false" >> "$GITHUB_OUTPUT"
          fi

          echo "test-packages=$test_json" >> "$GITHUB_OUTPUT"
          echo "Packages with tests: $test_json"

  lint:
    uses: ./.github/workflows/.lint.yml
    with:
      ruby-versions: '["3.1", "3.2", "3.3", "3.4", "4.0"]'

  test:
    needs: discover
    if: needs.discover.outputs.has-test == 'true'
    uses: ./.github/workflows/.test.yml
    with:
      packages: ${{ needs.discover.outputs.test-packages }}
      ruby-versions: '["3.1", "3.2", "3.3", "3.4", "4.0"]'

  monorepo-check:
    name: Monorepo DAG
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: "3.2"
          bundler-cache: true
      - run: bundle install
      - run: bundle exec rake monorepo:check_cycles
